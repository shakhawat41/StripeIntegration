# =============================================================================
# nginx configuration for the frontend container
# Serves the React SPA and proxies API requests to the backend
# =============================================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/ requests to the backend Spring Boot container.
    # This enables same-origin API calls from the frontend,
    # avoiding CORS issues in the browser.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-file routes
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
